name: Release

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '__tests__/**'
      - '**/*.test.ts'
      - '**/*.spec.ts'
      - '.github/**'
      - '.eslintrc*'
      - '.prettierrc*'
      - '.editorconfig'
      - '.gitignore'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Release v')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type from PR labels
        id: bump
        run: |
          # 직전 머지 커밋에서 PR 번호 추출
          PR_NUM=$(git log -1 --pretty=%s | grep -oP '#\K\d+' || echo "")
          BUMP="patch"
          if [ -n "$PR_NUM" ]; then
            LABELS=$(gh pr view "$PR_NUM" --json labels -q '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "skip-release"; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if echo "$LABELS" | grep -q "major"; then BUMP="major"
            elif echo "$LABELS" | grep -q "minor"; then BUMP="minor"
            fi
          fi
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        if: steps.bump.outputs.skip != 'true'
        id: version
        run: |
          NEW_VERSION=$(npm version ${{ steps.bump.outputs.type }} --no-git-tag-version)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG
        if: steps.bump.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          DATE=$(date +%Y-%m-%d)
          # git log since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log "${LAST_TAG}..HEAD~1" --pretty=format:"- %s" --no-merges)
          else
            CHANGES="- Initial release"
          fi
          # Insert after "# Changelog" line
          ENTRY="\n## ${VERSION} (${DATE})\n\n${CHANGES}\n"
          sed -i "s/^# Changelog$/# Changelog\n${ENTRY}/" CHANGELOG.md

      - name: Commit, tag, and push
        if: steps.bump.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "Release ${VERSION}"
          git tag "${VERSION}"
          git push origin master --tags

      - name: Install dependencies
        if: steps.bump.outputs.skip != 'true'
        run: npm ci --legacy-peer-deps

      - name: Lint, test, and build
        if: steps.bump.outputs.skip != 'true'
        run: npm run lint && npm test && npm run build

      - name: Publish to npm
        if: steps.bump.outputs.skip != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
